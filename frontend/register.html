<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsMan – Create Account</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">⚙️</div>
                <h1>OpsMan</h1>
                <p class="auth-subtitle">Create a New Account</p>
            </div>

            <form id="registerForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                           placeholder="Choose a username" autocomplete="username" required>
                    <span class="field-error" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control"
                           placeholder="Enter your email" autocomplete="email" required>
                    <span class="field-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" name="password" class="form-control"
                               placeholder="Min. 8 characters" autocomplete="new-password" required>
                        <button type="button" class="input-addon" onclick="togglePassword('password')" aria-label="Toggle password visibility">👁</button>
                    </div>
                    <span class="field-error" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                               placeholder="Re-enter your password" autocomplete="new-password" required>
                        <button type="button" class="input-addon" onclick="togglePassword('confirmPassword')" aria-label="Toggle password visibility">👁</button>
                    </div>
                    <span class="field-error" id="confirmPasswordError"></span>
                </div>

                <div id="registerError" class="alert alert-danger hidden"></div>

                <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                    <span id="registerBtnText">Create Account</span>
                    <span id="registerSpinner" class="spinner hidden"></span>
                </button>
            </form>

            <div class="auth-footer" style="text-align:center;">
                <p class="text-muted text-sm">Already have an account? <a href="index.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = getToken();
            const user  = getStoredUser();
            if (token && user) {
                redirectByRole(user.role);
                return;
            }

            const form = document.getElementById('registerForm');
            if (form) {
                form.addEventListener('submit', handleRegister);
            }
        });

        async function handleRegister(e) {
            e.preventDefault();
            clearErrors();

            const username        = document.getElementById('username').value.trim();
            const email           = document.getElementById('email').value.trim();
            const password        = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            let valid = true;

            if (!username) {
                showFieldError('usernameError', 'Username is required');
                valid = false;
            } else if (username.length < 3) {
                showFieldError('usernameError', 'Username must be at least 3 characters');
                valid = false;
            }
            if (!email) {
                showFieldError('emailError', 'Email is required');
                valid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showFieldError('emailError', 'Enter a valid email address');
                valid = false;
            }
            if (!password) {
                showFieldError('passwordError', 'Password is required');
                valid = false;
            } else if (password.length < 8) {
                showFieldError('passwordError', 'Password must be at least 8 characters');
                valid = false;
            }
            if (!confirmPassword) {
                showFieldError('confirmPasswordError', 'Please confirm your password');
                valid = false;
            } else if (password !== confirmPassword) {
                showFieldError('confirmPasswordError', 'Passwords do not match');
                valid = false;
            }
            if (!valid) return;

            setLoading('registerBtn', true);

            try {
                const res = await fetch(API_BASE_URL + '/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        action: 'register',
                        username,
                        email,
                        password
                    })
                });

                const data = await res.json();

                if (!data.success) {
                    showRegisterError(data.error || 'Registration failed. Please try again.');
                    return;
                }

                setAuth(data.data.token, data.data.user);
                showToast('Account created! Redirecting…', 'success', 1200);
                setTimeout(() => redirectByRole(data.data.user.role), 800);

            } catch (err) {
                showRegisterError('Unable to connect to server. Please try again.');
            } finally {
                setLoading('registerBtn', false);
            }
        }

        function redirectByRole(role) {
            if (role === 'field_employee' || role === 'field_agent') {
                window.location.href = 'employee-portal.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        function showFieldError(id, msg) {
            const el = document.getElementById(id);
            if (el) el.textContent = msg;
        }

        function showRegisterError(msg) {
            const el = document.getElementById('registerError');
            if (el) {
                el.textContent = msg;
                el.classList.remove('hidden');
            }
        }

        function clearErrors() {
            ['usernameError', 'emailError', 'passwordError', 'confirmPasswordError'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.textContent = '';
            });
            const errEl = document.getElementById('registerError');
            if (errEl) errEl.classList.add('hidden');
        }

        function togglePassword(fieldId) {
            const p = document.getElementById(fieldId);
            p.type = p.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
