<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsMan – Alerts</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-page">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><span class="logo-icon">⚙️</span><span class="logo-text">OpsMan</span></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="shipments.html"  class="nav-item"><span class="nav-icon">🚢</span> Shipments</a>
            <a href="customs.html"    class="nav-item"><span class="nav-icon">🛃</span> Customs</a>
            <a href="warehouses.html" class="nav-item"><span class="nav-icon">🏭</span> Warehouses</a>
            <a href="transit.html"    class="nav-item"><span class="nav-icon">🚛</span> Transit</a>
            <a href="tasks.html"      class="nav-item"><span class="nav-icon">✅</span> Tasks</a>
            <a href="employees.html"  class="nav-item"><span class="nav-icon">👥</span> Employees</a>
            <a href="reports.html"    class="nav-item"><span class="nav-icon">📋</span> Reports</a>
            <a href="analytics.html"  class="nav-item"><span class="nav-icon">📈</span> Analytics</a>
            <a href="alerts.html"    class="nav-item active"><span class="nav-icon">🔔</span> Alerts</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info" id="userInfo"></div>
            <button class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <h2 class="page-title">Alerts</h2>
            <button class="btn btn-outline btn-sm" onclick="markAllRead()">✓ Mark All Read</button>
        </header>

        <!-- Filters -->
        <div class="filters-bar card">
            <div class="filter-group">
                <select id="filterSeverity" class="form-control form-control-sm" onchange="loadAlerts()">
                    <option value="">All Severities</option>
                    <option value="critical">Critical</option>
                    <option value="warning">Warning</option>
                    <option value="info">Info</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="filterRead" class="form-control form-control-sm" onchange="loadAlerts()">
                    <option value="">All</option>
                    <option value="0">Unread</option>
                    <option value="1">Read</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="filterRelated" class="form-control form-control-sm" onchange="loadAlerts()">
                    <option value="">All Types</option>
                    <option value="task">Task</option>
                    <option value="employee">Employee</option>
                    <option value="shipment">Shipment</option>
                </select>
            </div>
        </div>

        <!-- Alerts List -->
        <div id="alertsList" class="alerts-page-list">
            <div class="loading-spinner">Loading…</div>
        </div>
        <div class="pagination" id="alertsPagination"></div>
    </main>

    <div id="toast-container"></div>
    <script src="js/app.js"></script>
    <script>
        let alertPage = 1;

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadAlerts();
        });

        function checkAuth() {
            const user = getStoredUser();
            if (!user) { window.location.href = 'index.html'; return; }
            document.getElementById('userInfo').textContent = user.username;
        }

        async function loadAlerts() {
            const severity  = document.getElementById('filterSeverity').value;
            const isRead    = document.getElementById('filterRead').value;
            const relatedTo = document.getElementById('filterRelated').value;
            const qs = new URLSearchParams({ page: alertPage, per_page: 20 });
            if (severity)  qs.set('severity',   severity);
            if (isRead !== '') qs.set('is_read', isRead);
            if (relatedTo) qs.set('related_to', relatedTo);

            const list = document.getElementById('alertsList');
            list.innerHTML = '<div class="loading-spinner">Loading…</div>';

            try {
                const res = await api(`/api/alerts.php?${qs}`);
                if (!res.data?.length) {
                    list.innerHTML = '<p class="text-center text-muted">No alerts found.</p>';
                    return;
                }
                list.innerHTML = res.data.map(a => `
                    <div class="alert-item ${a.is_read ? '' : 'unread'} severity-${a.severity}" id="alert-${a.id}">
                        <div class="alert-icon">${severityIcon(a.severity)}</div>
                        <div class="alert-content">
                            <div class="alert-title">${a.title}</div>
                            <div class="alert-message">${a.message}</div>
                            <div class="alert-meta">
                                <span class="badge ${severityBadge(a.severity)}">${a.severity}</span>
                                ${a.related_to ? `<span class="text-muted">${a.related_to} #${a.related_id}</span>` : ''}
                                <span class="text-muted">${formatDate(a.created_at)}</span>
                            </div>
                        </div>
                        <div class="alert-actions">
                            ${!a.is_read ? `<button class="btn btn-xs btn-outline" onclick="markRead(${a.id})">Mark Read</button>` : ''}
                            <button class="btn btn-xs btn-danger" onclick="deleteAlert(${a.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
                renderPagination(res.pagination, 'alertsPagination', p => { alertPage = p; loadAlerts(); });
            } catch (e) {
                list.innerHTML = `<p class="text-center text-danger">${e.message}</p>`;
            }
        }

        function severityIcon(s) {
            return s === 'critical' ? '🔴' : s === 'warning' ? '🟡' : 'ℹ️';
        }
        function severityBadge(s) {
            return s === 'critical' ? 'badge-danger' : s === 'warning' ? 'badge-warning' : 'badge-info';
        }

        async function markRead(id) {
            try {
                await api(`/api/alerts.php?id=${id}&action=read`, 'PUT');
                document.getElementById(`alert-${id}`)?.classList.remove('unread');
                showToast('Marked as read', 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function markAllRead() {
            try {
                await api('/api/alerts.php?action=read-all', 'PUT');
                showToast('All alerts marked as read', 'success');
                loadAlerts();
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function deleteAlert(id) {
            if (!confirm('Delete this alert?')) return;
            try {
                await api(`/api/alerts.php?id=${id}`, 'DELETE');
                showToast('Alert deleted', 'success');
                loadAlerts();
            } catch (e) { showToast(e.message, 'error'); }
        }
    </script>
</body>
</html>
