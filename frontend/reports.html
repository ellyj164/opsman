<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsMan – Reports</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-page">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><span class="logo-icon">⚙️</span><span class="logo-text">OpsMan</span></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="shipments.html"  class="nav-item"><span class="nav-icon">🚢</span> Shipments</a>
            <a href="customs.html"    class="nav-item"><span class="nav-icon">🛃</span> Customs</a>
            <a href="warehouses.html" class="nav-item"><span class="nav-icon">🏭</span> Warehouses</a>
            <a href="transit.html"    class="nav-item"><span class="nav-icon">🚛</span> Transit</a>
            <a href="tasks.html"      class="nav-item"><span class="nav-icon">✅</span> Tasks</a>
            <a href="employees.html"  class="nav-item"><span class="nav-icon">👥</span> Employees</a>
            <a href="reports.html"   class="nav-item active"><span class="nav-icon">📋</span> Reports</a>
            <a href="analytics.html" class="nav-item"><span class="nav-icon">📈</span> Analytics</a>
            <a href="alerts.html"    class="nav-item"><span class="nav-icon">🔔</span> Alerts</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info" id="userInfo"></div>
            <button class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <h2 class="page-title">Field Reports</h2>
        </header>

        <!-- Filters -->
        <div class="filters-bar card">
            <div class="filter-group">
                <label class="form-label-sm">Employee</label>
                <select id="filterEmployee" class="form-control form-control-sm" onchange="loadReports()">
                    <option value="">All Employees</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="form-label-sm">Status</label>
                <select id="filterStatus" class="form-control form-control-sm" onchange="loadReports()">
                    <option value="">All</option>
                    <option value="draft">Draft</option>
                    <option value="submitted">Submitted</option>
                    <option value="reviewed">Reviewed</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="form-label-sm">From</label>
                <input type="date" id="filterDateFrom" class="form-control form-control-sm" onchange="loadReports()">
            </div>
            <div class="filter-group">
                <label class="form-label-sm">To</label>
                <input type="date" id="filterDateTo" class="form-control form-control-sm" onchange="loadReports()">
            </div>
        </div>

        <!-- Reports Table -->
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Task</th>
                            <th>Employee</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reportsBody">
                        <tr><td colspan="8" class="text-center">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="reportsPagination"></div>
        </div>
    </main>

    <!-- Report Detail Modal -->
    <div class="modal-overlay hidden" id="reportDetailModal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3>Report Details</h3>
                <button class="modal-close" onclick="closeModal('reportDetailModal')">✕</button>
            </div>
            <div class="modal-body" id="reportDetailBody"></div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="js/app.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
