<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsMan – Tasks</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-page">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><span class="logo-icon">⚙️</span><span class="logo-text">OpsMan</span></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html"           class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="employee-dashboard.html"  class="nav-item"><span class="nav-icon">👤</span> My Dashboard</a>
            <a href="shipments.html"           class="nav-item"><span class="nav-icon">🚢</span> Shipments</a>
            <a href="customs.html"             class="nav-item"><span class="nav-icon">🛃</span> Customs</a>
            <a href="warehouses.html"          class="nav-item"><span class="nav-icon">🏭</span> Warehouses</a>
            <a href="transit.html"             class="nav-item"><span class="nav-icon">🚛</span> Transit</a>
            <a href="tasks.html"               class="nav-item active"><span class="nav-icon">✅</span> Tasks</a>
            <a href="employees.html"           class="nav-item"><span class="nav-icon">👥</span> Employees</a>
            <a href="points.html"              class="nav-item"><span class="nav-icon">🏆</span> Points</a>
            <a href="reports.html"             class="nav-item"><span class="nav-icon">📋</span> Reports</a>
            <a href="analytics.html"           class="nav-item"><span class="nav-icon">📈</span> Analytics</a>
            <a href="alerts.html"              class="nav-item"><span class="nav-icon">🔔</span> Alerts <span class="badge badge-danger" id="alertBadge">0</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info" id="userInfo"></div>
            <button class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <h2 class="page-title">Tasks</h2>
            <button class="btn btn-primary" onclick="openCreateTaskModal()" id="createTaskBtn">+ New Task</button>
        </header>

        <!-- Filters -->
        <div class="filters-bar card">
            <div class="filter-group">
                <select id="filterStatus" class="form-control form-control-sm" onchange="applyFilters()">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="assigned">Assigned</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                    <option value="overdue">Overdue</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="filterPriority" class="form-control form-control-sm" onchange="applyFilters()">
                    <option value="">All Priorities</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="filterType" class="form-control form-control-sm" onchange="applyFilters()">
                    <option value="">All Types</option>
                    <option value="customs_declaration">Customs Declaration</option>
                    <option value="warehouse_inspection">Warehouse Inspection</option>
                    <option value="border_transit_supervision">Border Transit</option>
                    <option value="cargo_inspection">Cargo Inspection</option>
                </select>
            </div>
            <div class="filter-group filter-search">
                <input type="text" id="filterSearch" class="form-control form-control-sm"
                       placeholder="Search tasks…" oninput="applyFilters()">
            </div>
        </div>

        <!-- Tasks Table -->
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover" id="tasksTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th>Type</th>
                            <th>Assigned To</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Deadline</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tasksBody">
                        <tr><td colspan="8" class="text-center">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="tasksPagination"></div>
        </div>
    </main>

    <!-- Create/Edit Task Modal -->
    <div class="modal-overlay hidden" id="taskModal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3 id="taskModalTitle">Create Task</h3>
                <button class="modal-close" onclick="closeModal('taskModal')">✕</button>
            </div>
            <div class="modal-body">
                <form id="taskForm" novalidate>
                    <input type="hidden" id="taskId">
                    <div class="form-row">
                        <div class="form-group col-8">
                            <label class="form-label">Title *</label>
                            <input type="text" id="taskTitle" class="form-control" required>
                        </div>
                        <div class="form-group col-4">
                            <label class="form-label">Priority *</label>
                            <select id="taskPriority" class="form-control" required>
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-6">
                            <label class="form-label">Task Type *</label>
                            <select id="taskType" class="form-control" required>
                                <option value="customs_declaration">Customs Declaration</option>
                                <option value="warehouse_inspection">Warehouse Inspection</option>
                                <option value="border_transit_supervision">Border Transit Supervision</option>
                                <option value="cargo_inspection">Cargo Inspection</option>
                            </select>
                        </div>
                        <div class="form-group col-6">
                            <label class="form-label">Assign To</label>
                            <select id="taskAssignTo" class="form-control">
                                <option value="">Unassigned</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-6">
                            <label class="form-label">Location</label>
                            <input type="text" id="taskLocation" class="form-control" placeholder="Location">
                        </div>
                        <div class="form-group col-6">
                            <label class="form-label">Shipment Ref</label>
                            <input type="text" id="taskShipmentRef" class="form-control" placeholder="SHP-2024-XXX">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Deadline</label>
                        <input type="datetime-local" id="taskDeadline" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="taskDescription" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-outline" onclick="closeModal('taskModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div class="modal-overlay hidden" id="taskDetailModal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3 id="taskDetailTitle">Task Details</h3>
                <button class="modal-close" onclick="closeModal('taskDetailModal')">✕</button>
            </div>
            <div class="modal-body" id="taskDetailBody"></div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="js/app.js"></script>
    <script src="js/tasks.js"></script>
</body>
</html>
