<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsMan – Shipments</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-page">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><span class="logo-icon">⚙️</span><span class="logo-text">OpsMan</span></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html"           class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="employee-dashboard.html"  class="nav-item"><span class="nav-icon">👤</span> My Dashboard</a>
            <a href="shipments.html"           class="nav-item active"><span class="nav-icon">🚢</span> Shipments</a>
            <a href="customs.html"             class="nav-item"><span class="nav-icon">🛃</span> Customs</a>
            <a href="warehouses.html"          class="nav-item"><span class="nav-icon">🏭</span> Warehouses</a>
            <a href="transit.html"             class="nav-item"><span class="nav-icon">🚛</span> Transit</a>
            <a href="tasks.html"               class="nav-item"><span class="nav-icon">✅</span> Tasks</a>
            <a href="employees.html"           class="nav-item"><span class="nav-icon">👥</span> Employees</a>
            <a href="points.html"              class="nav-item"><span class="nav-icon">🏆</span> Points</a>
            <a href="reports.html"             class="nav-item"><span class="nav-icon">📋</span> Reports</a>
            <a href="analytics.html"           class="nav-item"><span class="nav-icon">📈</span> Analytics</a>
            <a href="alerts.html"              class="nav-item"><span class="nav-icon">🔔</span> Alerts <span class="badge badge-danger" id="alertBadge">0</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info" id="userInfo"></div>
            <button class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <h2 class="page-title">Shipments</h2>
            <button class="btn btn-primary" onclick="openCreateModal()" id="createBtn">+ New Shipment</button>
        </header>

        <!-- Stats -->
        <section class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
            <div class="stat-card stat-blue"><div class="stat-icon">🚢</div><div class="stat-content"><div class="stat-value" id="sTotal">–</div><div class="stat-label">Total</div></div></div>
            <div class="stat-card stat-orange"><div class="stat-icon">🔄</div><div class="stat-content"><div class="stat-value" id="sActive">–</div><div class="stat-label">Active</div></div></div>
            <div class="stat-card stat-green"><div class="stat-icon">✅</div><div class="stat-content"><div class="stat-value" id="sCleared">–</div><div class="stat-label">Cleared</div></div></div>
            <div class="stat-card stat-purple"><div class="stat-icon">⛔</div><div class="stat-content"><div class="stat-value" id="sHeld">–</div><div class="stat-label">Held</div></div></div>
        </section>

        <!-- Filters -->
        <div class="filters-bar card">
            <div class="filter-group">
                <select id="filterStatus" class="form-control form-control-sm" onchange="applyFilters()">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="in_transit">In Transit</option>
                    <option value="arrived">Arrived</option>
                    <option value="cleared">Cleared</option>
                    <option value="held">Held</option>
                </select>
            </div>
            <div class="filter-group filter-search">
                <input type="text" id="filterSearch" class="form-control form-control-sm"
                       placeholder="Search shipments…" oninput="applyFilters()">
            </div>
        </div>

        <!-- Table -->
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover" id="shipmentsTable">
                    <thead>
                        <tr>
                            <th>Ref #</th>
                            <th>Shipper</th>
                            <th>Consignee</th>
                            <th>Route</th>
                            <th>Cargo</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="shipmentsBody">
                        <tr><td colspan="7" class="text-center">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination-bar" id="paginationBar"></div>
        </div>
    </main>

    <!-- Create/Edit Modal -->
    <div class="modal-overlay hidden" id="formModal">
        <div class="modal" style="max-width:650px">
            <div class="modal-header">
                <h3 id="formModalTitle">New Shipment</h3>
                <button class="modal-close" onclick="closeModal('formModal')">×</button>
            </div>
            <div class="modal-body">
                <form id="shipmentForm" onsubmit="handleFormSubmit(event)">
                    <input type="hidden" id="shipmentId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ref Number *</label>
                            <input type="text" id="fRefNumber" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="fStatus" class="form-control">
                                <option value="pending">Pending</option>
                                <option value="in_transit">In Transit</option>
                                <option value="arrived">Arrived</option>
                                <option value="cleared">Cleared</option>
                                <option value="held">Held</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Shipper Name *</label>
                            <input type="text" id="fShipperName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Consignee Name *</label>
                            <input type="text" id="fConsigneeName" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Origin *</label>
                            <input type="text" id="fOrigin" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Destination *</label>
                            <input type="text" id="fDestination" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Cargo Type *</label>
                            <input type="text" id="fCargoType" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Cargo Weight (kg)</label>
                            <input type="number" id="fCargoWeight" class="form-control" step="0.01">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Client Name</label>
                            <input type="text" id="fClientName" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Client Email</label>
                            <input type="email" id="fClientEmail" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Client Phone</label>
                        <input type="text" id="fClientPhone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="fNotes" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline" onclick="closeModal('formModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="formSubmitBtn">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay hidden" id="detailModal">
        <div class="modal" style="max-width:700px">
            <div class="modal-header">
                <h3 id="detailTitle">Shipment Detail</h3>
                <button class="modal-close" onclick="closeModal('detailModal')">×</button>
            </div>
            <div class="modal-body" id="detailBody"></div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="js/app.js"></script>
    <script src="js/shipments.js"></script>
</body>
</html>
